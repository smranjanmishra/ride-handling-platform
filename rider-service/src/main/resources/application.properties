spring.application.name= rider-service
app=${spring.application.name}
server.port=8081

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/rider_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Service URLs
services.driver-service.url=http://localhost:8082
services.notification-service.url=http://localhost:8083

# JWT
jwt.secret=MySecretKeyForJWTTokenGenerationInRiderService2026VeryStrongAndLongSecret
jwt.expiration=86400000
jwt.algorithm=HS512

# Pricing
pricing.base-fare=50.0
pricing.per-km-rate=10.0

# Driver Search
driver.search-radius-km=10.0

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Logging
logging.level.com.zeta.rider=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{ISO8601} [%X{correlationId}] %-5level %logger{36} - %msg%n
logging.file.name=logs/rider-service.log
