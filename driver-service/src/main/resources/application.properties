spring.application.name=driver-service
server.port=8082

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/driver_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

#spring.datasource.url=
#spring.datasource.username=
#spring.datasource.password=
#spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Service URLs
services.rider-service.url=http://localhost:8081
services.notification-service.url=http://localhost:8083

# JWT
jwt.secret=MySecretKeyForJWTTokenGenerationInDriverService2026VeryStrongAndLongSecret
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Logging
logging.level.com.zeta.driver_service=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{ISO8601} [%X{correlationId}] %-5level %logger{36} - %msg%n
logging.file.name=logs/driver-service.log


